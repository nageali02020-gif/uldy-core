<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kramesk Store - Trial</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg-black: #080808; --card-bg: #121212; --white: #ffffff; --whatsapp-green: #25D366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-black); color: var(--white); text-align: right; overflow-x: hidden; }
        nav { padding: 20px 8%; background: rgba(8,8,8,0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(212,175,55,0.1); display: flex; justify-content: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--gold); }
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #080808 100%); margin-top: 60px; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .products-section { padding: 50px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        .card-price { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        .btn-buy { display: block; background: var(--whatsapp-green); color: white; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        /* Chat UI */
        .chat-toggle { position: fixed; bottom: 20px; left: 20px; background: var(--gold); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; font-size: 24px; color: black; }
        .chat-window { position: fixed; bottom: 90px; left: 20px; width: 320px; height: 450px; background: #121212; border: 1px solid var(--gold); border-radius: 15px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        .chat-header { background: var(--gold); color: black; padding: 15px; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .msg.bot { background: #222; align-self: flex-start; }
        .msg.user { background: var(--gold); color: black; align-self: flex-end; }
        .chat-input { padding: 10px; display: flex; gap: 5px; background: #1a1a1a; }
        .chat-input input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; }
        .chat-input button { background: var(--gold); border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <nav><div class="logo">KRAMESK STORE</div></nav>
    <section class="hero"><h1>KRAMESK</h1><p>إكسسوارات النخبة</p></section>
    <section class="products-section">
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=500" alt="ساعة">
                <div class="card-body"><h3>ساعة كلاسيك</h3><div class="card-price">350 د.ل</div><a href="https://wa.me/218917021437" class="btn-buy">طلب عبر واتساب</a></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500" alt="عقد">
                <div class="card-body"><h3>طقم ملكي</h3><div class="card-price">580 د.ل</div><a href="https://wa.me/218917021437" class="btn-buy">طلب عبر واتساب</a></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=500" alt="خاتم">
                <div class="card-body"><h3>خاتم ألماس</h3><div class="card-price">290 د.ل</div><a href="https://wa.me/218917021437" class="btn-buy">طلب عبر واتساب</a></div>
            </div>
        </div>
    </section>
    <div class="chat-toggle" onclick="toggleChat()"><i class="fas fa-robot"></i></div>
    <div class="chat-window" id="chatWin">
        <div class="chat-header">مساعد كراميسك</div>
        <div class="chat-messages" id="msgs"><div class="msg bot">مرحباً بك! كيف أساعدك؟</div></div>
        <div class="chat-input"><input type="text" id="userInput" placeholder="اكتب سؤالك..."><button onclick="send()">إرسال</button></div>
    </div>
    <script>
        const API_KEY = "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";
        function toggleChat() { const w = document.getElementById('chatWin'); w.style.display = w.style.display === 'flex' ? 'none' : 'flex'; }
        async function send() {
            const inp = document.getElementById('userInput');
            const m = document.getElementById('msgs');
            if(!inp.value) return;
            const uText = inp.value;
            m.innerHTML += `<div class="msg user">${uText}</div>`;
            inp.value = '';
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST', headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role:"system", content:"أنت مساعد متجر كراميسك (Kramesk). المتجر يبيع ساعات بـ 350، أطقم بـ 580، وخواتم بـ 290 د.ل. واتساب: 0917021437. رد بلهجة ليبية."}, {role:"user", content:uText}] })
                });
                const d = await res.json();
                m.innerHTML += `<div class="msg bot">${d.choices[0].message.content}</div>`;
            } catch { m.innerHTML += `<div class="msg bot">تواصل معنا واتساب: 0917021437</div>`; }
            m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
