<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMINZ Market | سوق النطاقات المميزة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; --card: #111; --white: #ffffff; --price-gold: #FFD700; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--white); text-align: center; }
        
        nav { padding: 25px 8%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--accent); letter-spacing: 3px; }

        .hero { padding: 60px 20px; background: radial-gradient(circle at center, #001a33 0%, #050505 100%); }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { color: #888; font-size: 1rem; }

        .market-container { padding: 40px 8%; max-width: 900px; margin: 0 auto; }
        .domain-card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s ease;
        }
        .domain-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.1); }
        
        .domain-info { text-align: right; }
        .domain-name { font-size: 1.4rem; font-weight: bold; color: var(--white); text-transform: lowercase; }
        .badge { background: #1a1a1a; color: var(--accent); padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; margin-top: 5px; display: inline-block; border: 1px solid #333; }

        .price-section { display: flex; align-items: center; gap: 20px; }
        .price-tag { font-size: 1.3rem; font-weight: bold; color: var(--price-gold); font-family: 'Orbitron', sans-serif; }
        
        .buy-btn { 
            background: var(--accent); 
            color: #000; 
            padding: 8px 20px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .buy-btn:hover { background: var(--white); }

        footer { padding: 30px; border-top: 1px solid #111; color: #444; font-size: 0.8rem; }

        @media (max-width: 650px) {
            .domain-card { flex-direction: column; gap: 15px; text-align: center; }
            .domain-info { text-align: center; }
            .price-section { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav><div class="logo">DOMINZ MARKET</div></nav>

    <section class="hero">
        <h1>مجموعة النطاقات الحصرية</h1>
        <p>استثمر في هويتك الرقمية مع DOMINZ</p>
    </section>

    <div class="market-container">
        
        <div class="domain-card">
            <div class="domain-info">
                <span class="domain-name">usdbot.ai</span>
                <br><span class="badge">ذكاء اصطناعي / بوتات</span>
            </div>
            <div class="price-section">
                <div class="price-tag">$9,800</div>
                <a href="https://wa.me/218917021437?text=أريد الاستفسار عن شراء دومين usdbot.ai" class="buy-btn">شراء الآن</a>
            </div>
        </div>

        <div class="domain-card">
            <div class="domain-info">
                <span class="domain-name">vlsfo.com</span>
                <br><span class="badge">طاقة / شحن بحري</span>
            </div>
            <div class="price-section">
                <div class="price-tag">$78,900</div>
                <a href="https://wa.me/218917021437?text=أريد الاستفسار عن شراء دومين vlsfo.com" class="buy-btn">شراء الآن</a>
            </div>
        </div>

        <div class="domain-card">
            <div class="domain-info">
                <span class="domain-name">vlsfo.xyz</span>
                <br><span class="badge">نطاق ويب 3</span>
            </div>
            <div class="price-section">
                <div class="price-tag">$45,000</div>
                <a href="https://wa.me/218917021437?text=أريد الاستفسار عن شراء دومين vlsfo.xyz" class="buy-btn">شراء الآن</a>
            </div>
        </div>

        <div class="domain-card">
            <div class="domain-info">
                <span class="domain-name">techllms.xyz</span>
                <br><span class="badge">تقنية LLM / برمجيات</span>
            </div>
            <div class="price-section">
                <div class="price-tag">$1,400</div>
                <a href="https://wa.me/218917021437?text=أريد الاستفسار عن شراء دومين techllms.xyz" class="buy-btn">شراء الآن</a>
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 DOMINZ Market. All Rights Reserved.</p>
    </footer>

</body>
</html>
