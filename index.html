<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kramesk Domains | نطاقات كراميسك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #080808; --card: #121212; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--white); text-align: center; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { padding: 20px; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); font-weight: 900; }

        .container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px; color: var(--white); }
        
        .domain-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .domain-item { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #222; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: 0.3s;
        }
        .domain-item:hover { border-color: var(--gold); transform: scale(1.02); }
        .domain-name { font-size: 1.2rem; font-weight: bold; color: var(--gold); letter-spacing: 1px; }
        .status { font-size: 0.8rem; background: rgba(212,175,55,0.1); padding: 5px 10px; border-radius: 20px; color: #aaa; }

        footer { padding: 20px; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav><div class="logo">KRAMESK</div></nav>

    <div class="container">
        <h1>النطاقات المسجلة</h1>
        
        <div class="domain-list">
            <div class="domain-item">
                <span class="domain-name">techllms.xyz</span>
                <span class="status">نشط</span>
            </div>

            <div class="domain-item">
                <span class="domain-name">kramesk.shop</span>
                <span class="status">قيد الإعداد</span>
            </div>

            </div>
    </div>

    <footer>
        <p>&copy; 2026 Kramesk Domain Management</p>
    </footer>

</body>
</html>
